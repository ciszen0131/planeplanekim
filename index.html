<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plane Plane Kim - 시각화</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="left">택이의 비행기 수</div>
    <nav class="tabs">
      <button class="tab active">무작위</button>
      <button class="tab">뒤에서</button>
      <button class="tab">알파뱃순</button>
    </nav>
    <div class="actions">
      <button id="start">시작</button>
      <button id="pause">일시중지</button>
    </div>
  </header>

  <main class="container">
    <section class="stats">
      <div class="card">
        <div class="label">전체 시간</div>
        <div class="value" id="time">0s</div>
      </div>
      <div class="card">
        <div class="label">탑승객 인원</div>
        <div class="value" id="count">0 / 0명</div>
        <div class="progress"><div id="progressBar"></div></div>
      </div>
      <div class="card">
        <div class="label">줄이 멈춘 시간</div>
        <div class="value" id="bottleneck">0</div>
      </div>
    </section>

   <!-- <section class="controls" aria-label="시뮬레이션 컨트롤">
      <label class="control">
        <span class="control-label">속도</span>
        <input type="range" id="speedControl" min="0.6" max="1.6" step="0.1" value="1">
        <span class="control-value" id="speedValue">1.0x</span>
      </label>
      <label class="control">
        <span class="control-label">밀도</span>
        <input type="range" id="densityControl" min="0.6" max="1.8" step="0.1" value="1">
        <span class="control-value" id="densityValue">1.0x</span>
      </label>
    </section>-->

    <section class="seating-area">
      <aside class="passenger-side" id="passengerSide"></aside>

      <div class="seating-card">
        <div class="seats" id="seats"></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
